<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page login-page">
    <section class="panel login-panel">
      <h1>Teacher Login</h1>

      <form id="teacherLoginForm">
        <label for="teacherEmail">Teacher Email</label>
        <input type="email" id="teacherEmail" placeholder="teacher@gmail.com" value="teacher@gmail.com" required>

        <label for="teacherPassword">Password</label>
        <input type="password" id="teacherPassword" placeholder="teacher123" value="teacher123" required>

        <button type="submit">Login</button>
      </form>

      <div id="teacherLoginStatus"></div>
    </section>
  </main>

  <script src="teacher-login.js"></script>
</body>
</html>
